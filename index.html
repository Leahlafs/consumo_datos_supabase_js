<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css">
    <title>Libros Supabase</title>
  </head>
  <body>
    <h1>Lista de Libros</h1>


<div class="formulario">

<input type="text" id="titulo" placeholder="Título">
<input type="text" id="autor" placeholder="Autor">
<input type="number" id="anio" placeholder="Año">
<input type="text" id="genero" placeholder="Género">

<button class="btnAgregar" id="agregarLibro">Agregar</button>
<button class="btnCargar" id="cargarDatos">Cargar libros</button>
</div>
<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>Título</th>
      <th>Autor</th>
      <th>Año</th>
      <th>Género</th>
    </tr>
  </thead>


  <tbody id="tablaLibros">
  </tbody>
</table>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
